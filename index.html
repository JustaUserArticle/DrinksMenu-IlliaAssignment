<!DOCTYPE html>
<html>
<head>
    <title>Drinks Menu</title>
    <style>
    table, tr, td {
        border: 1px solid black;
    }
</style>
</head>
<body>
    <table width="600">
        <caption><h3>Drinks Menu</h3></caption>
        <thead>
            <tr>
                <th>Hot Drinks</th>
                <th>Cold Drinks</th>
                <th>Smoothies</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Coffee $4</td>
                <td>Juice $2</td>
                <td>Berry $7</td>
            </tr>
            <tr>
                <td>Tea $3</td>
                <td>Soda $2.5</td>
                <td>Mango $8</td>
            </tr>
            <tr>
                <td>Hot Chocolate $5</td>
                <td>Milkshake $6</td>
                <td>Banana $7.5</td>
            </tr>
        </tbody>
    </table>

    <ul>
        <li><b>Juice</b> is the cheapest item on the menu.</li>
        <li><b>Mango smoothie</b> is the most expensive item on the menu.</li>
    </ul>

</body>
</html>
